<div class="app-shell">
  <header class="app-header">
    <div>
      <h1>SystemLink Health Check</h1>
      <p>Service registry status <span class="version">v{{ version }}</span></p>
    </div>
    <div class="header-actions">
      <nimble-button
        appearance="outline"
        [disabled]="isRunning"
        (click)="fetchServices()"
        ><span class="button-content"><nimble-icon-arrows-repeat class="button-icon"></nimble-icon-arrows-repeat><span>Refresh</span></span></nimble-button
      >
    </div>
  </header>

  <section class="status-row">
    <span *ngIf="lastRun && !errorMessage" class="summary" [class.all-pass]="summary.startsWith('All')">
      {{ summary }} — last run {{ lastRun }}
      <span *ngIf="latencyMs !== null" class="latency">({{ latencyMs }} ms)</span>
    </span>
    <span *ngIf="errorMessage" class="summary error">{{ summary }}: {{ errorMessage }}</span>
    <span *ngIf="isRunning" class="summary running">Fetching service registry...</span>
  </section>

  <section *ngIf="services.length" class="checks-grid">
    <div class="check-header">
      <span class="col-status">Status</span>
      <span class="col-name">Service</span>
    </div>

    <div
      *ngFor="let svc of services"
      class="check-row"
      [class.live]="svc.status === 'LIVE'"
      [class.unknown]="svc.status === 'UNKNOWN'"
      [class.down]="svc.status !== 'LIVE' && svc.status !== 'UNKNOWN'"
    >
      <span class="col-status status-icon" [class.status-live]="svc.status === 'LIVE'" [class.status-unknown]="svc.status === 'UNKNOWN'" [class.status-down]="svc.status !== 'LIVE' && svc.status !== 'UNKNOWN'">
        {{ statusIcon(svc.status) }}
      </span>
      <span class="col-name">{{ svc.name }}</span>
    </div>
  </section>
</div>
